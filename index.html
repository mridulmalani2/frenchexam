// FAIRE UN ACHAT — Dialogue & Expressions  ~15 Qs
// ══════════════════════════════════════════
{id:246,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Expression de boutique.',text:'Le vendeur dit: "Je peux vous aider?" Vous cherchez une robe. Répondez:',options:['Non merci.','Oui, je cherche une robe.','C\'est combien?','Je la prends.'],answer:1,explanation:'"Je cherche + article/vêtement" = standard response to "puis-je vous aider?"'},
{id:247,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Vocabulaire achat.',text:'"to try on" en français:',options:['acheter','porter','essayer','chercher'],answer:2,explanation:'essayer = to try on (clothing). Je voudrais essayer cette robe.'},
{id:248,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Vocabulaire achat.',text:'"How much does it cost?" en français:',options:['C\'est combien? / Ça coûte combien?','Vous avez la taille?','Je la prends.','Voilà la robe.'],answer:0,explanation:'C\'est combien? / Ça coûte combien? / Elle coûte combien? = standard price questions'},
{id:249,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Vocabulaire achat.',text:'"I\'ll take it." en français:',options:['Je l\'essaie.','Je la cherche.','Je la prends.','Je la vends.'],answer:2,explanation:'Je la prends. = I\'ll take it. (deciding to buy)'},
{id:250,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Moyen de paiement.',text:'"I\'m paying by card." en français:',options:['Je paie en espèces.','Je paie par carte.','Je paie par chèque.','Vous payez comment?'],answer:1,explanation:'payer par carte = to pay by card. payer en espèces = to pay in cash'},
{id:251,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Vocabulaire achat.',text:'"cash" en français:',options:['par carte','par chèque','en espèces','en ligne'],answer:2,explanation:'en espèces = in cash'},
{id:252,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Dialogue achat. Vrai ou Faux?',text:'Dans le dialogue boutique: "La robe rouge coûte 35 euros."',options:['Vrai','Faux — elle coûte 40 euros'],answer:1,explanation:'La robe rouge coûte 40 euros. La robe bleue coûte 35 euros.'},
{id:253,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Dialogue achat.',text:'La robe bleue est _____ chère que la robe rouge.',options:['plus','aussi','moins','très'],answer:2,explanation:'La robe bleue (35€) est moins chère que la robe rouge (40€).'},
{id:254,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Dialogue achat.',text:'La cliente préfère la robe rouge parce qu\'elle est plus:',options:['longue','chère','élégante','courte'],answer:2,explanation:'La cliente dit: "Je préfère la robe rouge. Elle est plus élégante."'},
{id:255,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Donner son opinion.',text:'"C\'est _____ style." (It\'s my style.)',options:['mon','son','votre','le'],answer:0,explanation:'C\'est mon style. / Ce n\'est pas mon style. = standard opinion phrases in shopping context'},
{id:256,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Donner son opinion.',text:'Pour exprimer que quelque chose est beau: "C\'est _____ !"',options:['sombre','cher','beau / joli / élégant','mon style'],answer:2,explanation:'C\'est + adjectif: beau, joli, élégant, parfait, spécial, différent, long, cher, serré'},
{id:257,cat:'vocabulaire',sub:'Achat',type:'text',instruction:'Traduisez.',text:'"It\'s perfect! I\'ll take it. I\'m paying by card."',hint:'C\'est parfait, je la prends, je paie par carte',answer:['c\'est parfait je la prends je paie par carte','c est parfait je la prends je paie par carte'],explanation:'C\'est parfait! Je la prends. Je paie par carte.'},
{id:258,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Complétez.',text:'_____, je voudrais essayer la robe rouge, s\'il vous plaît.',options:['Voilà','Oui','Non','D\'accord'],answer:1,explanation:'"Oui, je voudrais essayer..." = polite request in a shop'},
{id:259,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Choisissez.',text:'Le vendeur demande après l\'essayage: "Alors, _____ ?"',options:['ça va','c\'est combien','vous payez','vous cherchez'],answer:0,explanation:'"Alors, ça va?" = standard follow-up after trying on clothing'},
{id:260,cat:'vocabulaire',sub:'Achat',type:'mcq',instruction:'Complétez.',text:'La robe rouge est _____ longue que la robe bleue.',options:['plus','moins','aussi','autant'],answer:1,explanation:'Le vendeur dit: "elle est aussi plus longue" (referring to the blue dress being longer) → la robe rouge est moins longue que la bleue'},
// ══════════════════════════════════════════
// FRÉQUENCE — PLACEMENT DANS LA PHRASE  ~20 Qs
// ══════════════════════════════════════════
{id:261,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Placement des adverbes de fréquence. Règle:',text:'Les adverbes de fréquence (souvent, toujours, parfois...) se placent:',options:['avant le sujet','après le verbe conjugué','à la fin de la phrase uniquement','avant le verbe infinitif'],answer:1,explanation:'Adverbes de fréquence → après le verbe conjugué: Je vais toujours au café. / Elle se lève souvent tôt.'},
{id:262,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"Nous allons au cinéma." + (rarement) →',options:['Rarement nous allons au cinéma.','Nous rarement allons au cinéma.','Nous allons rarement au cinéma.','Nous allons au cinéma rarement.'],answer:2,explanation:'Adverbe après le verbe: Nous allons rarement au cinéma.'},
{id:263,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"Allez-vous au théâtre?" + (parfois) →',options:['Allez-vous parfois au théâtre?','Parfois allez-vous au théâtre?','Allez-vous au parfois théâtre?','Vous parfois allez au théâtre?'],answer:0,explanation:'Dans une question avec inversion: sujet-verbe + adverbe + complément. Allez-vous parfois au théâtre?'},
{id:264,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"Pendant les vacances, ils vont à la piscine." + (régulièrement) →',options:['Ils régulièrement vont à la piscine.','Ils vont régulièrement à la piscine.','Régulièrement ils vont à la piscine.','Ils vont à la piscine régulièrement.'],answer:1,explanation:'Adverbe après le verbe conjugué: ils vont régulièrement à la piscine.'},
{id:265,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"Ma mère se lève avant 7h." + (toujours) →',options:['Ma mère toujours se lève.','Ma mère se lève toujours avant 7h.','Toujours ma mère se lève.','Ma mère se toujours lève.'],answer:1,explanation:'Adverbe après le verbe: se lève + toujours. Ma mère se lève toujours avant 7h.'},
{id:266,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"Bertrand participe à des courses populaires." + (quelquefois) →',options:['Quelquefois Bertrand participe.','Bertrand quelquefois participe.','Bertrand participe quelquefois à des courses populaires.','Bertrand participe à quelquefois.'],answer:2,explanation:'Adverbe après le verbe conjugué: Bertrand participe quelquefois à des courses populaires.'},
{id:267,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"Faites-vous la vaisselle?" + (souvent) →',options:['Faites-vous souvent la vaisselle?','Souvent faites-vous la vaisselle?','Faites-vous la vaisselle souvent?','Vous faites souvent la vaisselle?'],answer:0,explanation:'Question inversion + adverbe: Faites-vous souvent la vaisselle?'},
{id:268,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"Tu fais du sport." + (deux fois par semaine) →',options:['Deux fois par semaine tu fais du sport.','Tu fais du sport deux fois par semaine.','Tu deux fois par semaine fais du sport.','Tu fais deux fois du sport.'],answer:1,explanation:'Les expressions de fréquence longues (deux fois par semaine) se placent en fin de phrase: Tu fais du sport deux fois par semaine.'},
{id:269,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Ex 4 — placez l\'adverbe.',text:'"J\'ai cours de français." + (tous les mercredis) →',options:['Tous les mercredis j\'ai cours de français.','J\'ai tous les mercredis cours.','J\'ai cours de français tous les mercredis.','J\'ai cours tous les mercredis de français.'],answer:2,explanation:'Expression de temps longue → fin de phrase: J\'ai cours de français tous les mercredis.'},
{id:270,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Choisissez la fréquence correcte (pyramide).',text:'Du plus fréquent au moins fréquent — ordre correct:',options:['toujours > souvent > parfois > de temps en temps > rarement > jamais','jamais > rarement > parfois > souvent > toujours','souvent > toujours > rarement > jamais > parfois','rarement > parfois > souvent > toujours > jamais'],answer:0,explanation:'Pyramide: toujours (100%) > souvent > parfois/de temps en temps > rarement > jamais (0%)'},
{id:271,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Quelle fréquence?',text:'"Je me douche souvent le matin" indique:',options:['jamais','rarement','souvent (fréquent)','toujours (100%)'],answer:2,explanation:'souvent = frequently, most of the time (not 100%)'},
{id:272,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Choisissez.',text:'"Je me couche rarement après minuit" signifie:',options:['Je me couche toujours après minuit.','Je me couche souvent après minuit.','Je me couche très peu souvent après minuit.','Je ne me couche jamais après minuit.'],answer:2,explanation:'rarement = very infrequently (but not never). Je me couche rarement après minuit = it almost never happens.'},
{id:273,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Placement avec verbe pronominal.',text:'"Je me lève tôt." + (toujours) →',options:['Je toujours me lève tôt.','Je me lève toujours tôt.','Toujours je me lève tôt.','Je me toujours lève tôt.'],answer:1,explanation:'Avec verbe pronominal: pronom réfléchi + verbe + adverbe. Je me lève toujours tôt.'},
{id:274,cat:'grammaire',sub:'Fréquence',type:'mcq',instruction:'Placement avec verbe pronominal.',text:'"Il se couche tard." + (jamais) → forme négative correcte:',options:['Il ne jamais se couche tard.','Il ne se couche jamais tard.','Il se ne couche jamais tard.','Il jamais se couche tard.'],answer:1,explanation:'Négation + jamais avec pronominal: ne + se + verbe + jamais. Il ne se couche jamais tard.'},
{id:275,cat:'grammaire',sub:'Fréquence',type:'text',instruction:'Produisez une phrase.',text:'"I always have breakfast at 8am." en français:',hint:'Je prends toujours, petit-déjeuner',answer:['je prends toujours le petit-déjeuner à 8h','je prends toujours mon petit-déjeuner à 8h'],explanation:'Je prends toujours le petit-déjeuner à 8h.'},
{id:276,cat:'grammaire',sub:'Fréquence',type:'text',instruction:'Produisez une phrase.',text:'"She sometimes works in the evening." en français:',hint:'elle travaille parfois',answer:['elle travaille parfois le soir','elle travaille parfois en soirée'],explanation:'Elle travaille parfois le soir.'},

// ══════════════════════════════════════════
// APP STATE & LOGIC
// ══════════════════════════════════════════
let state={filter:'all',pool:[],current:null,answered:false,score:0,total:0,streak:0,seen:new Set(),qCount:0};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function setFilter(f,btn){
  state.filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildPool();nextQuestion();
}

function buildPool(){
  const pool=state.filter==='all'?QUESTIONS:QUESTIONS.filter(q=>q.cat===state.filter);
  state.pool=shuffle(pool);
  state.seen.clear();
  document.getElementById('qBankVal').textContent=pool.length;
}

function pickQuestion(){
  let unseen=state.pool.filter(q=>!state.seen.has(q.id));
  if(unseen.length===0){state.seen.clear();state.pool=shuffle(state.pool);unseen=state.pool;}
  const q=unseen[Math.floor(Math.random()*unseen.length)];
  state.seen.add(q.id);return q;
}

function nextQuestion(){state.answered=false;state.current=pickQuestion();state.qCount++;renderQuestion();updateStats();}

function updateStats(){
  document.getElementById('streakVal').textContent=state.streak+(state.streak>=3?'🔥':'');
  document.getElementById('scoreVal').textContent=state.score;
  document.getElementById('totalVal').textContent=state.total;
  const pct=state.total>0?Math.round(state.score/state.total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLbl').textContent='Score: '+pct+'%';
}

const CAT_LABELS={comparaison:'Comparaison',grammaire:'Grammaire',futur:'Futur Proche',reflexifs:'Verbes Pronominaux',vocabulaire:'Vocabulaire',prepositions:'Prépositions de Lieux',connecteurs:'Connecteurs Logiques',adjectifs:'Place des Adjectifs',traduction:'Traduction',couleurs:'Couleurs'};

function renderQuestion(){
  const q=state.current;
  const main=document.getElementById('mainContent');
  const tagLabel=CAT_LABELS[q.cat]||q.cat;
  const subTag=q.sub?` — ${q.sub}`:'';
  let inputHTML='';
  if(q.type==='mcq'){
    inputHTML=`<div class="options">`+q.options.map((o,i)=>`<button class="option" onclick="checkMCQ(${i})" id="opt${i}"><span class="option-letter">${String.fromCharCode(65+i)}</span>${o}</button>`).join('')+`</div>`;
  }else if(q.type==='text'){
    inputHTML=`<div class="text-input-wrap"><input type="text" class="text-input" id="textAns" placeholder="Votre réponse..." onkeydown="if(event.key==='Enter'&&!state.answered)checkText()" autocomplete="off"></div>`;
  }else if(q.type==='fill'){
    inputHTML=buildFillHTML(q);
  }
  main.innerHTML=`<div class="question-card"><div class="q-meta"><span class="q-tag tag-${q.cat}">${tagLabel}${subTag}</span><span class="q-diff">#${state.qCount}</span></div><div class="q-instruction">${q.instruction}</div><div class="q-text">${q.text}</div>${q.hint?`<div class="q-hint">Indice: <span>${q.hint}</span></div>`:''} ${inputHTML}<div class="feedback" id="feedback"></div><div class="btn-row">${q.type==='text'?`<button class="btn btn-secondary" onclick="checkText()">Vérifier</button>`:''} ${q.type==='fill'?`<button class="btn btn-secondary" onclick="checkFill()">Vérifier</button>`:''}<button class="btn btn-skip" onclick="skipQ()">Passer →</button><button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">Suivant →</button></div></div>`;
  if(q.type==='text')setTimeout(()=>{const el=document.getElementById('textAns');if(el)el.focus();},50);
}

function buildFillHTML(q){
  let html=`<div class="fill-blank-sentence">`;
  const parts=q.text.split('_____');
  parts.forEach((part,i)=>{html+=part;if(i<parts.length-1)html+=`<input type="text" class="blank-input" id="blank${i}" placeholder="..." autocomplete="off">`;});
  return html+`</div>`;
}

function norm(s){return(s||'').toLowerCase().replace(/[àáâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/ç/g,'c').replace(/[''']/g,'\'').trim();}

function checkMCQ(idx){
  if(state.answered)return;state.answered=true;
  const q=state.current,correct=idx===q.answer;
  registerResult(correct);
  document.querySelectorAll('.option').forEach((btn,i)=>{btn.disabled=true;if(i===q.answer)btn.classList.add('correct');else if(i===idx&&!correct)btn.classList.add('wrong');});
  showFeedback(correct,q.options[q.answer],q.explanation);
  document.getElementById('nextBtn').style.display='block';
}

function checkText(){
  if(state.answered)return;
  const input=document.getElementById('textAns');if(!input)return;
  const val=norm(input.value);
  const q=state.current;
  const correct=q.answer.some(ans=>{
    const na=norm(ans);
    if(val===na)return true;
    // Check if key words present
    const keyWords=na.split(' ').filter(w=>w.length>3);
    const matchCount=keyWords.filter(w=>val.includes(w)).length;
    return matchCount>=Math.max(1,Math.floor(keyWords.length*0.6));
  });
  state.answered=true;registerResult(correct);
  input.classList.add(correct?'correct':'wrong');input.disabled=true;
  showFeedback(correct,q.answer[0],q.explanation);
  document.getElementById('nextBtn').style.display='block';
}

function checkFill(){
  if(state.answered)return;
  const q=state.current;state.answered=true;let allCorrect=true;
  q.blanks.forEach((ans,i)=>{
    const input=document.getElementById('blank'+i);if(!input)return;
    const ok=norm(input.value)===norm(ans)||norm(input.value).includes(norm(ans).slice(0,5));
    input.classList.add(ok?'correct':'wrong');input.disabled=true;
    if(!ok)allCorrect=false;
  });
  registerResult(allCorrect);
  showFeedback(allCorrect,q.blanks.join(' / '),q.explanation);
  document.getElementById('nextBtn').style.display='block';
}

function registerResult(correct){
  state.total++;
  if(correct){state.score++;state.streak++;}else{state.streak=0;}
  updateStats();showFlash(correct);
}

function skipQ(){if(!state.answered){state.total++;state.streak=0;updateStats();}nextQuestion();}

function showFeedback(correct,answer,explanation){
  const fb=document.getElementById('feedback');
  fb.className=`feedback ${correct?'correct-fb':'wrong-fb'}`;
  fb.style.display='block';
  fb.innerHTML=`<div class="feedback-title">${correct?'✓ Correct !':'✗ Incorrect'}</div><div class="feedback-body">${!correct?`<div>Réponse: <span class="answer-reveal">${answer}</span></div>`:''}<div>${explanation}</div></div>`;
}

function showFlash(correct){
  const el=document.createElement('div');
  el.className=`score-flash ${correct?'flash-correct':'flash-wrong'}`;
  el.textContent=correct?'+1 ✓':'✗';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

buildPool();nextQuestion();
</script>
